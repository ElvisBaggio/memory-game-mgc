<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jogo da Memória - Magalu Cloud</title>
<meta name="description" content="Jogo da Memória com termos de cloud computing da Magalu Cloud. Teste sua memória!">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo-area">
      <img src="assets/logo-mgc.svg" alt="Magalu Cloud" class="logo-img">
      <div class="logo-sub">Jogo da Memória</div>
    </div>
    <div class="stats">
      <div class="stat-box"><div class="stat-label">Jogadas</div><div class="stat-value" id="moves">0</div></div>
      <div class="stat-box"><div class="stat-label">Tempo</div><div class="stat-value timer" id="timer">0:00</div></div>
      <div class="stat-box"><div class="stat-label">Pares</div><div class="stat-value pairs" id="pairsFound">0 / 0</div></div>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" onclick="openSettings()"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Config</button>
      <button class="btn btn-primary" onclick="startGame()"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Novo Jogo</button>
    </div>
  </div>

  <div class="game-area"><div class="board" id="board"></div></div>
</div>

<!-- Victory Overlay -->
<div class="victory-overlay" id="victory">
  <div class="victory-icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--primary-blue-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></div>
  <div class="victory-title">Parabéns!</div>
  <div class="victory-stats" id="victoryStats"></div>
  <button class="btn btn-primary btn-lg" onclick="closeVictory();startGame();" style="margin-top:12px;"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Jogar Novamente</button>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2><svg style="width:20px;height:20px;vertical-align:middle;margin-right:8px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Configurações</h2>

    <div class="section-label">Tamanho do Tabuleiro</div>
    <div class="grid-select">
      <div class="grid-opt" data-grid="2x5" onclick="selectGrid('2x5')">2×5<br><small>5 pares</small></div>
      <div class="grid-opt" data-grid="4x4" onclick="selectGrid('4x4')">4×4<br><small>8 pares</small></div>
      <div class="grid-opt" data-grid="4x5" onclick="selectGrid('4x5')">4×5<br><small>10 pares</small></div>
      <div class="grid-opt" data-grid="4x6" onclick="selectGrid('4x6')">4×6<br><small>12 pares</small></div>
    </div>

    <div class="section-label">Palavras do Jogo</div>
    <div class="modal-words" id="wordList"></div>

    <div class="section-label">Adicionar Novo Termo</div>
    <div class="add-word-row">
      <input type="text" id="newWordInput" placeholder="Ex: Computação Serverless" maxlength="30">
      <button class="btn btn-primary" onclick="addWord()">Adicionar</button>
    </div>

    <div class="section-label">Ícone do Termo</div>
    <div class="image-source-tabs">
      <div class="image-source-tab active" data-tab="emoji" onclick="switchSourceTab('emoji')">🎨 Emoji</div>
      <div class="image-source-tab" data-tab="image" onclick="switchSourceTab('image')">🖼️ Imagem</div>
    </div>

    <!-- Tab: Emoji -->
    <div class="tab-content active" data-tab="emoji">
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>

    <!-- Tab: Image Upload -->
    <div class="tab-content" data-tab="image">
      <input type="file" id="imageFileInput" accept="image/*" style="display:none">
      <div class="image-upload-area" id="imageUploadArea">
        <div class="upload-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
        <div class="upload-label">Arraste uma imagem ou <span>clique para escolher</span></div>
        <div class="upload-hint">JPG, PNG, GIF, WebP ou SVG — máx. 5MB</div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeSettings()">Cancelar</button>
      <button class="btn btn-accent" onclick="closeSettings();startGame();">Salvar & Jogar</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
